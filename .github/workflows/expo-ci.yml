name: eas build development
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 EAS Build
        id: eas_build
        run: |
          build_json=$(eas build --platform android --non-interactive --profile development --json)
          echo "Build JSON Output: $build_json"

          android_link=$(echo "$build_json" | jq -r '.[] | select(.platform=="android") | .artifacts.applicationArchiveUrl')
          qr_code=$(echo "$build_json" | jq -r '.[] | select(.platform=="android") | .artifacts.qrCodeUrl')

          echo "android_link=$android_link" >> $GITHUB_ENV
          echo "qr_code=$qr_code" >> $GITHUB_ENV

      - name: 📜 Publish Build Summary
        run: |
          echo "## EAS Build Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Android Build URL**: [$android_link]($android_link)" >> $GITHUB_STEP_SUMMARY
          echo "- **QR Code**: ![]($qr_code)" >> $GITHUB_STEP_SUMMARY
