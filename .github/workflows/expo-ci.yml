name: eas build development

on:
  push:
    branches:
      - main  # or specify the branches you want this to run on

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: EAS Build
        id: eas_build
        run: |
          build_id=$(eas build --platform android --non-interactive --profile development | grep -oP '(?<=Build ID: )\S+')
          echo "build_id=$build_id" >> $GITHUB_ENV
          echo "Build ID: $build_id"  # This will print the build ID in the logs

      - name: Wait for EAS build to finish
        id: wait_for_build
        run: |
          while true; do
            status=$(curl -s -X GET https://expo.dev/api/v2/builds/$build_id -H "Authorization: Bearer ${{ secrets.EXPO_PAT }}" | jq -r '.data.status')
            if [[ "$status" == "finished" || "$status" == "errored" ]]; then
              echo "Build finished with status: $status"
              break
            fi
            echo "Waiting for the build to finish..."
            sleep 30
          done

      - name: Display Build Details in Workflow Summary
        run: |
          build_url="https://expo.dev/accounts/${{ secrets.EXPO_ACCOUNT_NAME }}/projects/${{ secrets.EXPO_PROJECT_NAME }}/builds/$build_id"
          echo "## EAS Build Details" >> $GITHUB_ENV
          echo "Build ID: $build_id" >> $GITHUB_ENV
          echo "Build URL: $build_url" >> $GITHUB_ENV

      - name: Show Build Details in Summary
        run: |
          echo "EAS Build ID: ${{ env.build_id }}"
          echo "EAS Build URL: ${{ env.build_url }}"
        continue-on-error: true
