name: EAS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build development profile
        run: eas build --platform android --non-interactive --profile development

      - name: Generate Build Summary with Expo QR Code
        run: |
          echo "## EAS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Development Profile" >> $GITHUB_STEP_SUMMARY
          echo "![Expo QR](https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=exp://exp.host/@andreaslydemann/todo-app?release-channel=development)" >> $GITHUB_STEP_SUMMARY
          echo "- Build URL: https://exp.host/@andreaslydemann/todo-app?release-channel=development" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Notify Slack on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text": "✅ EAS Build succeeded for *${{ github.repository }}* on branch *${{ github.ref_name }}*"}' ${{ secrets.SLACK_WEBHOOK }}

      - name: ❌ Notify Slack on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text": "❌ EAS Build failed for *${{ github.repository }}* on branch *${{ github.ref_name }}*"}' ${{ secrets.SLACK_WEBHOOK }}
