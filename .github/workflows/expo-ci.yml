name: EAS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger

jobs:
  eas-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run EAS Build
        id: eas_build  # Add an ID so we can reference the result
        run: eas build --platform android --non-interactive --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_PAT }}

      - name: Notify Slack on success
        if: success()  # Only runs if the previous steps succeeded
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text": "✅ EAS Build succeeded for *${{ github.repository }}* on branch *${{ github.ref_name }}*"}' ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()  # Only runs if the previous steps failed
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text": "❌ EAS Build failed for *${{ github.repository }}* on branch *${{ github.ref_name }}*"}' ${{ secrets.SLACK_WEBHOOK }}