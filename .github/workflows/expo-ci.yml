name: eas build development
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build app
        run: |
          eas build --platform android --non-interactive --profile development > build_output.txt

      - name: Get build URL
        run: |
          export BUILD_URL=$(grep -o 'https://expo.dev/accounts.*' build_output.txt)
          echo "BUILD_URL=${BUILD_URL}" >> $GITHUB_ENV

      - name: 📄 Add build URL to summary
        run: echo "Build URL: $BUILD_URL" >> $GITHUB_STEP_SUMMARY

      - name: 📱 Generate QR Code
        run: |
          sudo apt-get install qrencode
          qrencode -o qr.png "${{ env.BUILD_URL }}"
          echo "![Build QR Code](qr.png)" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload QR Code
        uses: actions/upload-artifact@v3
        with:
          name: build-qr-code
          path: qr.png
