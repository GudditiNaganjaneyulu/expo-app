name: eas build development
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: EAS Build
        id: eas_build
        run: |
          # Run EAS build with the development profile and capture the build ID
          EAS_OUTPUT=$(eas build --platform android --non-interactive --profile development --output json)
          BUILD_ID=$(echo $EAS_OUTPUT | jq -r '.id')
          BUILD_URL="https://expo.dev/accounts/${{ secrets.EXPO_ACCOUNT_NAME }}/projects/${{ secrets.EXPO_PROJECT_NAME }}/builds/$BUILD_ID"
          QR_CODE_URL="https://api.qrserver.com/v1/create-qr-code/?data=$BUILD_URL&size=300x300"
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "QR_CODE_URL=$QR_CODE_URL" >> $GITHUB_ENV

      - name: 🟢 Send Slack message on success
        if: success()
        run: |
          MESSAGE="🤖 Open this link on your Android devices (or scan the QR code) to install the app:\n<$BUILD_URL>\n\nQR Code:\n$QR_CODE_URL"
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "'"$MESSAGE"'"
            }' ${{ secrets.SLACK_WEBHOOK }}

      # Notify on failure
      - name: 🔴 Send Slack message on failure
        if: failure()
        run: |
          MESSAGE="Build failed for the project \`${{ secrets.EXPO_PROJECT_NAME }}\`! Please check the details at https://expo.dev/accounts/${{ secrets.EXPO_ACCOUNT_NAME }}/projects/${{ secrets.EXPO_PROJECT_NAME }}/builds"
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "'"$MESSAGE"'"
            }' ${{ secrets.SLACK_WEBHOOK }}
