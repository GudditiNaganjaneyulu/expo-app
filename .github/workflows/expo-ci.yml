name: eas build development
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: EAS Build
        id: eas_build
        run: eas build --platform android --non-interactive --profile development

      - name: 🗂 Download APK file
        run: |
          mkdir -p artifacts
          eas build:download --platform android --path artifacts/

      - name: 📦 Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: artifacts/*.apk
