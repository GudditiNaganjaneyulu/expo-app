name: eas build development
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: EAS Build
        id: eas_build
        run: |
          eas build --platform android --non-interactive --output build-id.txt

      - name: Send Slack Notification
        if: success() || failure() # Send message regardless of build success/failure
        run: |
          STATUS="success"
          if [ "${{ steps.eas_build.outcome }}" == "failure" ]; then
            STATUS="failure"
          fi

          # Get the build ID from the output file
          BUILD_ID=$(cat build-id.txt)

          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "EAS Build Status for *Development*:\n*Build Result*: '"$STATUS"'\nBuild ID: '"$BUILD_ID"'\nPlease check the details at https://expo.dev/accounts/${{ secrets.EXPO_ACCOUNT_NAME }}/projects/${{ secrets.EXPO_PROJECT_NAME }}/builds/'"$BUILD_ID"'"
          }' ${{ secrets.SLACK_WEBHOOK }}
