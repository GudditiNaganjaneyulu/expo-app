name: EAS Build

on:
  push:
  pull_request:
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_PAT }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build development profile and capture output
        id: eas_build
        run: |
          # Running EAS Update command and capturing output
          output=$(eas update --auto)
          echo "$output"
          
          # Extract the preview URL from the output (it starts with "https://exp.host/")
          preview_url=$(echo "$output" | grep -oP 'https://exp.host/\S+')

          # Extract the URL of the dashboard or the EAS build URL (assuming the first URL in the log)
          build_url=$(echo "$output" | grep -oP 'https://expo.dev/accounts/\S+/projects/\S+/updates/\S+')

          # Output to GitHub Actions for later use
          echo "Preview URL: $preview_url"
          echo "Build URL: $build_url"

          # Setting output for future steps
          echo "::set-output name=preview_url::$preview_url"
          echo "::set-output name=build_url::$build_url"

      - name: 🔗 Add build and preview URL + QR codes to workflow summary
        run: |
          # Adding Build URL and Preview URL to the summary
          echo "### EAS Build Result" >> $GITHUB_STEP_SUMMARY
          echo "[Build URL](${{ steps.eas_build.outputs.build_url }})" >> $GITHUB_STEP_SUMMARY
          echo "[Preview URL](${{ steps.eas_build.outputs.preview_url }})" >> $GITHUB_STEP_SUMMARY
          
          # Adding QR codes for both URLs to the summary
          echo "![Build QR Code](https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${{ steps.eas_build.outputs.build_url }})" >> $GITHUB_STEP_SUMMARY
          echo "![Preview QR Code](https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${{ steps.eas_build.outputs.preview_url }})" >> $GITHUB_STEP_SUMMARY
